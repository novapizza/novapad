name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-mac:
    environment: Production

    name: Build and Publish macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Verify signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" -A 2>&1 | tee /tmp/cert-import.log
          rm /tmp/cert.p12
          grep -q "Unknown format" /tmp/cert-import.log && echo "ERROR: certificate has wrong format" && exit 1 || echo "Certificate OK"

      - name: Publish macOS
        run: npx electron-builder --mac --publish always --config electron-builder.cjs
        env:
          # ── R2 is S3-compatible. Use provider: s3 with custom endpoint ────────────────────
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_RELEASES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_RELEASES_SECRET_ACCESS_KEY }}
          R2_RELEASES_ACCOUNT_ID: ${{ secrets.R2_RELEASES_ACCOUNT_ID }}
          R2_RELEASES_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ── Apple notarization and signing ────────────────────
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_FOR_PULL_REQUEST: false

  build-win:
    environment: Production
    
    name: Build and Publish Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Publish Windows
        run: npx electron-builder --win --publish always --config electron-builder.cjs
        env:
          # ── R2 is S3-compatible. Use provider: s3 with custom endpoint ────────────────────
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_RELEASES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_RELEASES_SECRET_ACCESS_KEY }}
          R2_RELEASES_ACCOUNT_ID: ${{ secrets.R2_RELEASES_ACCOUNT_ID }}
          R2_RELEASES_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}

          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Azure auth for Trusted Signing
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

          # Azure Trusted Signing config — read by electron-builder.cjs via
          # process.env. All four must be present for the sign step to engage;
          # if any are missing the cjs omits azureSignOptions and the build
          # falls back to the unsigned path.
          AZURE_PUBLISHER_NAME: ${{ secrets.AZURE_PUBLISHER_NAME }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_CODE_SIGNING_ACCOUNT_NAME: ${{ secrets.AZURE_CODE_SIGNING_ACCOUNT_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}

          # Optional: reduce Azure CLI output in logs
          AZURE_CORE_OUTPUT: none

  # Keep only the newest two versions in R2. Runs after both platform builds
  # have published, so the new release (and its manifests) are already up.
  # KEEP=2 preserves the previous version's .blockmap for delta updates.
  prune-r2:
    environment: Production
    name: Prune old R2 releases
    runs-on: ubuntu-latest
    needs: [build-mac, build-win]
    steps:
      - uses: actions/checkout@v4

      - name: Prune old releases (keep newest 2)
        run: bash scripts/prune-r2-releases.sh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_RELEASES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_RELEASES_SECRET_ACCESS_KEY }}
          R2_RELEASES_ACCOUNT_ID: ${{ secrets.R2_RELEASES_ACCOUNT_ID }}
          R2_RELEASES_BUCKET: ${{ secrets.R2_RELEASES_BUCKET }}
          KEEP: '2'
          # Flip to '1' for the first run to verify the deletion set in logs
          # before any object is removed.
          DRY_RUN: '0'
