version: 2
updates:
  # Application + tooling dependencies (pnpm uses the npm ecosystem).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev/tooling bumps into one PR to cut review noise.
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"

  # Keep GitHub Actions (release/audit/prune workflows) patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
