win:
  icon: resources/icons/win/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # perMachine=false runs the installer as the current user (no UAC). Per-user
  # installs keep the file-association registry entries under HKCU\Software\
  # Classes — Windows' "Open with → NovaPad" lookup works without admin.
  perMachine: false
  # menuCategory lets Windows group our context-menu entries into a submenu
  # ("NovaPad → Open with NovaPad / Edit with NovaPad") on Windows 10/11.
  menuCategory: NovaPad

# Code-signing — Developer ID Application certificate
#   Local build (build:mac): CSC_IDENTITY_AUTO_DISCOVERY=false skips
#     Keychain lookup → unsigned .app. notarize.cjs exits cleanly.
#   CI: secrets CSC_LINK (base64 .p12) + CSC_KEY_PASSWORD trigger signing.
# afterSign runs after code-signing; build/notarize.cjs skips gracefully
# when APPLE_* vars are absent.
afterSign: 'build/notarize.cjs'

mac:
  target:
    - target: dmg
      arch: ['x64', 'arm64']
    - target: zip
      arch: ['x64', 'arm64']
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  icon: resources/icons/mac/icon.icns
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Generic UTI handler entries: appear in macOS "Open With" submenu for any
  # text-shaped file that isn't covered by the explicit fileAssociations
  # extensions above (e.g. files with no extension). LSHandlerRank=Alternate
  # means we won't steal the OS default — we just join the chooser list.
  extendInfo:
    CFBundleDocumentTypes:
      - CFBundleTypeName: Text Document
        CFBundleTypeRole: Editor
        LSHandlerRank: Alternate
        LSItemContentTypes:
          - public.text
          - public.plain-text
          - public.utf8-plain-text
          - public.utf16-plain-text
          - public.source-code
          - public.script
          - public.shell-script
          - public.python-script
          - public.ruby-script
          - public.php-script
          - public.perl-script
          - public.json
          - public.xml
          - public.yaml
          - public.html
          - public.css
          - public.javascript

dmg:
  artifactName: "${productName}-${arch}.${ext}"
  window:
    width: 540
    height: 380

# publish config is built dynamically in electron-builder.cjs based on env vars
